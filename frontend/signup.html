<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
}

#id6{
    width: 400px;
    background: #fff;
    padding: 35px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    gap: 15px;
}

#id6::before{
    content: "🚀 Create Account";
    text-align: center;
    font-size: 28px;
    font-weight: bold;
    color: #333;
    margin-bottom: 10px;
}

#username,
#email,
#password{
    width: 100%;
    padding: 14px;
    border: 2px solid #ddd;
    border-radius: 8px;
    font-size: 16px;
    outline: none;
    transition: 0.3s;
}

#username:focus,
#email:focus,
#password:focus{
    border-color: #4f46e5;
    box-shadow: 0 0 8px rgba(79,70,229,0.3);
}

button{
    padding: 14px;
    border: none;
    border-radius: 8px;
    background: #4f46e5;
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover{
    background: #4338ca;
    transform: translateY(-2px);
}

button:active{
    transform: translateY(0);
}

.login-link{
    text-align: center;
    color: #666;
    font-size: 14px;
}

.login-link a{
    color: #4f46e5;
    text-decoration: none;
    font-weight: bold;
}

.login-link a:hover{
    text-decoration: underline;
}
    </style>
</head>
<body>
    <form id="id6">
        <input type="text" id="username" placeholder="Enter your username">
        <input type="text" id="email" placeholder="Enter your username">
        <input type="text" id="password" placeholder="Enter your username">
        <button type="submit">submit</button>
    </form>
    <script src="script.js"></script>
</body>
</html>
